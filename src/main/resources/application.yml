server:
  port: 8080

spring:
  application:
    name: camp-system
  datasource:
    url: jdbc:mysql://localhost:3306/fullstack_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
